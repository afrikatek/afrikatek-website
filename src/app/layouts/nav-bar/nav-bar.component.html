<header class="bg-[#023859] shadow-md">
    <nav class="mx-auto flex max-w-7xl items-center justify-between p-2">
        <!-- Logo -->
        <div class="flex gap-2 lg:flex-1 items-center">
          <img  class="bg-gray-200 w-10 h-10 rounded-2xl me-2" src="./img/logo-no-words.svg" alt="Company Logo">
            <span class="text-white text-xl font-semibold">Afrikatek</span>
        </div>

        <!-- Mobile menu button -->
        <div class="flex lg:hidden">
            <button type="button" (click)="toggleMenu()" class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-white hover:bg-[#0f3158] transition-colors duration-300">
                <span class="sr-only">{{ isMenuOpen ? 'Close menu' : 'Open menu' }}</span>
                <svg *ngIf="!isMenuOpen" class="size-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                    aria-hidden="true" data-slot="icon">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
                <svg *ngIf="isMenuOpen" class="size-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                    aria-hidden="true" data-slot="icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Desktop navigation -->
        <div class="hidden lg:flex">
            <a routerLink="/" [class.bg-[#0f3158]]="isActive('/')" class="text-sm font-semibold text-white py-4 px-6 hover:text-gray-300 transition-colors duration-300 rounded-md">Home</a>
            <a routerLink="/about" [class.bg-[#0f3158]]="isActive('/about')" class="text-sm font-semibold text-white py-4 px-6 hover:text-gray-300 transition-colors duration-300 rounded-md">About Us</a>
            <a routerLink="/products" [class.bg-[#0f3158]]="isActive('/products')" class="text-sm font-semibold text-white py-4 px-6 hover:text-gray-300 transition-colors duration-300 rounded-md">Products</a>
            <a routerLink="/services" [class.bg-[#0f3158]]="isActive('/services')" class="text-sm font-semibold text-white py-4 px-6 hover:text-gray-300 transition-colors duration-300 rounded-md">Services</a>
            <a routerLink="/contact" [class.bg-[#0f3158]]="isActive('/contact')" class="text-sm font-semibold text-white py-4 px-6 hover:text-gray-300 transition-colors duration-300 rounded-md">Contact Us</a>
            <a routerLink="/blog" [class.bg-[#0f3158]]="isActive('/blog')" class="text-sm font-semibold text-white py-4 px-6 hover:text-gray-300 transition-colors duration-300 rounded-md">Blog</a>
        </div>

        <!-- Desktop CTA button -->
        <div class="hidden lg:flex lg:flex-1 lg:justify-end">
            <a routerLink="/contact" class="text-sm font-semibold text-white py-2 px-6 border rounded-md border-white hover:bg-white hover:text-[#0a2342] transition-colors duration-300">Contact Us <span aria-hidden="true">&rarr;</span></a>
        </div>
    </nav>

    <!-- Mobile menu, show/hide based on menu state -->
    <div *ngIf="isMenuOpen" class="lg:hidden">
        <div class="space-y-1 px-4 py-3 border-t border-[#0f3158]">
            <a routerLink="/" (click)="toggleMenu()" [class.bg-[#0f3158]]="isActive('/')" class="block text-sm font-semibold text-white py-3 px-4 rounded-md hover:bg-[#0f3158] transition-colors duration-300">Home</a>
            <a routerLink="/about" (click)="toggleMenu()" [class.bg-[#0f3158]]="isActive('/about')" class="block text-sm font-semibold text-white py-3 px-4 rounded-md hover:bg-[#0f3158] transition-colors duration-300">About Us</a>
            <a routerLink="/products" (click)="toggleMenu()" [class.bg-[#0f3158]]="isActive('/products')" class="block text-sm font-semibold text-white py-3 px-4 rounded-md hover:bg-[#0f3158] transition-colors duration-300">Products</a>
            <a routerLink="/services" (click)="toggleMenu()" [class.bg-[#0f3158]]="isActive('/services')" class="block text-sm font-semibold text-white py-3 px-4 rounded-md hover:bg-[#0f3158] transition-colors duration-300">Services</a>
            <a routerLink="/contact" (click)="toggleMenu()" [class.bg-[#0f3158]]="isActive('/contact')" class="block text-sm font-semibold text-white py-3 px-4 rounded-md hover:bg-[#0f3158] transition-colors duration-300">Contact Us</a>
            <a routerLink="/blog" (click)="toggleMenu()" [class.bg-[#0f3158]]="isActive('/blog')" class="block text-sm font-semibold text-white py-3 px-4 rounded-md hover:bg-[#0f3158] transition-colors duration-300">Blog</a>
        </div>
        <div class="px-4 py-3 border-t border-[#0f3158]">
            <a routerLink="/contact" (click)="toggleMenu()" class="block w-full text-center text-sm font-semibold text-white py-3 px-4 border rounded-md border-white hover:bg-white hover:text-[#0a2342] transition-colors duration-300">Contact Us <span aria-hidden="true">&rarr;</span></a>
        </div>
    </div>
</header>
